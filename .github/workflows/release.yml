name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.2.3)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/nostr-vpn-gui/pnpm-lock.yaml

      - name: Build frontend
        run: |
          pnpm --dir crates/nostr-vpn-gui install --frozen-lockfile
          pnpm --dir crates/nostr-vpn-gui build

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --exclude nostr-vpn-gui --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --exclude nostr-vpn-gui

  build-linux:
    name: Build Linux release artifacts (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86_64
            target: x86_64-unknown-linux-musl
          - label: arm64
            target: aarch64-unknown-linux-musl
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Linux CLI
        run: cross build --release --target ${{ matrix.target }} -p nostr-vpn-cli

      - name: Package Linux artifacts
        shell: bash
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"
          mkdir -p dist/nvpn

          cp "${BIN_DIR}/nvpn" dist/nvpn/

          cat > dist/nvpn/install.sh << 'INSTALL_SCRIPT'
          #!/bin/bash
          set -e

          INSTALL_DIR="${1:-/usr/local/bin}"

          echo "Installing nvpn to ${INSTALL_DIR}"

          if [ ! -w "${INSTALL_DIR}" ]; then
            echo "Need sudo to install to ${INSTALL_DIR}"
            sudo install -m 755 nvpn "${INSTALL_DIR}/"
          else
            install -m 755 nvpn "${INSTALL_DIR}/"
          fi

          echo "Installed nvpn"
          echo "Verify with:"
          echo "  nvpn --help"
          INSTALL_SCRIPT
          chmod +x dist/nvpn/install.sh

          cat > dist/nvpn/README.txt << 'README_TXT'
          nvpn - Nostr-signaled WireGuard control plane
          ============================================

          Binary included:
            nvpn  - CLI control plane

          Quick install:
            ./install.sh              # installs to /usr/local/bin (may need sudo)
            ./install.sh ~/.local/bin # installs to custom directory

          Quick start:
            nvpn init --participant npub1...alice --participant npub1...bob
            nvpn up
            nvpn status

          More info: https://github.com/${{ github.repository }}
          README_TXT

          cd dist
          tar -czvf "nvpn-${{ matrix.target }}.tar.gz" nvpn
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "nvpn-${{ matrix.target }}.tar.gz" > "nvpn-${{ matrix.target }}.sha256"
          else
            shasum -a 256 "nvpn-${{ matrix.target }}.tar.gz" > "nvpn-${{ matrix.target }}.sha256"
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: dist/nvpn-${{ matrix.target }}.*
          retention-days: 7

  build-macos:
    name: Build macOS release artifacts
    runs-on: macos-14
    needs: verify
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
      MACOS_NOTARIZE_APP_PASSWORD: ${{ secrets.MACOS_NOTARIZE_APP_PASSWORD }}
      MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/nostr-vpn-gui/pnpm-lock.yaml

      - name: Install GUI dependencies
        run: pnpm --dir crates/nostr-vpn-gui install --frozen-lockfile

      - name: Validate macOS signing secret completeness (optional)
        if: ${{ (env.MACOS_SIGNING_IDENTITY != '' || env.MACOS_CERTIFICATE_P12 != '' || env.MACOS_CERTIFICATE_PASSWORD != '') && !(env.MACOS_SIGNING_IDENTITY != '' && env.MACOS_CERTIFICATE_P12 != '' && env.MACOS_CERTIFICATE_PASSWORD != '') }}
        shell: bash
        run: |
          echo "macOS signing requires all three secrets or none."
          echo "Required: MACOS_SIGNING_IDENTITY, MACOS_CERTIFICATE_P12, MACOS_CERTIFICATE_PASSWORD"
          exit 1

      - name: Validate macOS notarization secret completeness (optional)
        if: ${{ (env.MACOS_NOTARIZE_APPLE_ID != '' || env.MACOS_NOTARIZE_APP_PASSWORD != '' || env.MACOS_NOTARIZE_TEAM_ID != '') && !(env.MACOS_NOTARIZE_APPLE_ID != '' && env.MACOS_NOTARIZE_APP_PASSWORD != '' && env.MACOS_NOTARIZE_TEAM_ID != '') }}
        shell: bash
        run: |
          echo "macOS notarization requires all three secrets or none."
          echo "Required: MACOS_NOTARIZE_APPLE_ID, MACOS_NOTARIZE_APP_PASSWORD, MACOS_NOTARIZE_TEAM_ID"
          exit 1

      - name: Install macOS signing certificate (optional)
        if: ${{ env.MACOS_SIGNING_IDENTITY != '' && env.MACOS_CERTIFICATE_P12 != '' && env.MACOS_CERTIFICATE_PASSWORD != '' }}
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/nvpn-signing.keychain-db"
          KEYCHAIN_PASSWORD="${MACOS_KEYCHAIN_PASSWORD:-temp_signing_password}"
          CERT_PATH="$RUNNER_TEMP/nvpn-signing-cert.p12"

          printf '%s' "${MACOS_CERTIFICATE_P12}" | base64 --decode > "${CERT_PATH}" 2>/dev/null || \
            printf '%s' "${MACOS_CERTIFICATE_P12}" | base64 -D > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

          if ! security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | grep -Fq "${MACOS_SIGNING_IDENTITY}"; then
            echo "Expected signing identity not found: ${MACOS_SIGNING_IDENTITY}"
            exit 1
          fi

      - name: Build macOS app bundle
        run: pnpm --dir crates/nostr-vpn-gui exec tauri build --target aarch64-apple-darwin --bundles app --no-sign --ci

      - name: Code sign macOS app (optional)
        if: ${{ env.MACOS_SIGNING_IDENTITY != '' && env.MACOS_CERTIFICATE_P12 != '' && env.MACOS_CERTIFICATE_PASSWORD != '' }}
        shell: bash
        run: |
          APP_PATH="$(find target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "No macOS .app bundle found in build output"
            exit 1
          fi

          if [ -f "crates/nostr-vpn-gui/src-tauri/Release.entitlements" ]; then
            codesign --force --deep --options runtime --timestamp \
              --entitlements crates/nostr-vpn-gui/src-tauri/Release.entitlements \
              --sign "${MACOS_SIGNING_IDENTITY}" \
              "${APP_PATH}"
          else
            codesign --force --deep --options runtime --timestamp \
              --sign "${MACOS_SIGNING_IDENTITY}" \
              "${APP_PATH}"
          fi

          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"

      - name: Notarize macOS app (optional)
        if: ${{ env.MACOS_SIGNING_IDENTITY != '' && env.MACOS_CERTIFICATE_P12 != '' && env.MACOS_CERTIFICATE_PASSWORD != '' && env.MACOS_NOTARIZE_APPLE_ID != '' && env.MACOS_NOTARIZE_APP_PASSWORD != '' && env.MACOS_NOTARIZE_TEAM_ID != '' }}
        shell: bash
        run: |
          APP_PATH="$(find target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "No macOS .app bundle found in build output"
            exit 1
          fi

          NOTARIZE_ZIP="$RUNNER_TEMP/nvpn-notarize.zip"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${NOTARIZE_ZIP}"

          SUBMIT_OUTPUT="$(xcrun notarytool submit "${NOTARIZE_ZIP}" \
            --apple-id "${MACOS_NOTARIZE_APPLE_ID}" \
            --password "${MACOS_NOTARIZE_APP_PASSWORD}" \
            --team-id "${MACOS_NOTARIZE_TEAM_ID}" \
            --wait \
            --output-format json)"

          echo "${SUBMIT_OUTPUT}"

          SUBMISSION_ID="$(printf '%s' "${SUBMIT_OUTPUT}" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin).get("id",""))')"
          SUBMISSION_STATUS="$(printf '%s' "${SUBMIT_OUTPUT}" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))')"

          if [ "${SUBMISSION_STATUS}" != "Accepted" ]; then
            echo "Notarization status was '${SUBMISSION_STATUS}' (expected 'Accepted')."
            if [ -n "${SUBMISSION_ID}" ]; then
              xcrun notarytool log "${SUBMISSION_ID}" \
                --apple-id "${MACOS_NOTARIZE_APPLE_ID}" \
                --password "${MACOS_NOTARIZE_APP_PASSWORD}" \
                --team-id "${MACOS_NOTARIZE_TEAM_ID}" || true
            fi
            exit 1
          fi

          xcrun stapler staple "${APP_PATH}"
          xcrun stapler validate "${APP_PATH}"

      - name: Package macOS artifacts
        shell: bash
        run: |
          mkdir -p dist
          APP_PATH="$(find target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "No macOS .app bundle found in build output"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "dist/nostr-vpn-macos-arm64.zip"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "dist/nostr-vpn-macos-arm64.zip" > "dist/nostr-vpn-macos-arm64.sha256"
          else
            sha256sum "dist/nostr-vpn-macos-arm64.zip" > "dist/nostr-vpn-macos-arm64.sha256"
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/nostr-vpn-macos-arm64.*
          retention-days: 7

      - name: Cleanup macOS signing keychain (optional)
        if: ${{ always() && env.MACOS_SIGNING_IDENTITY != '' && env.MACOS_CERTIFICATE_P12 != '' && env.MACOS_CERTIFICATE_PASSWORD != '' }}
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/nvpn-signing.keychain-db"
          security delete-keychain "${KEYCHAIN_PATH}" || true
          rm -f "$RUNNER_TEMP/nvpn-signing-cert.p12" "$RUNNER_TEMP/nvpn-notarize.zip"

  release:
    name: Create GitHub Release
    needs:
      - build-linux
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/*
