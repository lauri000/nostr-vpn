services:
  web:
    image: ${NOSTR_VPN_IMAGE:-nostr-vpn-umbrel:local}
    build:
      context: ..
      dockerfile: umbrel/Dockerfile
    restart: unless-stopped
    ports:
      - ${NOSTR_VPN_WEB_PORT:-38080}:38080
    environment:
      HOME: /data/home
      XDG_CONFIG_HOME: /data/config
      NVPN_CLI_PATH: /usr/local/bin/nvpn
      RUST_LOG: info
    volumes:
      - ./.data:/data
