<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0f0f" />
    <title>Nostr VPN</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #081018;
        color: #e7f1ff;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      body {
        min-height: 100vh;
      }

      #app {
        min-height: 100vh;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 32px 24px;
        background:
          radial-gradient(circle at top, rgba(29, 82, 148, 0.42), transparent 54%),
          linear-gradient(180deg, #081018 0%, #0c1727 100%);
        transition:
          opacity 160ms ease,
          visibility 160ms ease;
      }

      #boot-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #boot-splash[data-state='error'] {
        justify-content: flex-start;
        background:
          radial-gradient(circle at top, rgba(148, 29, 63, 0.34), transparent 48%),
          linear-gradient(180deg, #160a12 0%, #1a0d16 100%);
      }

      #boot-kicker {
        margin-bottom: 10px;
        color: rgba(196, 214, 240, 0.72);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      #boot-title {
        margin: 0;
        font-size: 32px;
        line-height: 1.05;
      }

      #boot-detail {
        max-width: 30rem;
        margin-top: 14px;
        color: rgba(231, 241, 255, 0.78);
        font-size: 15px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" data-state="loading">
      <div id="boot-kicker">Launching</div>
      <h1 id="boot-title">Starting Nostr VPN</h1>
      <div id="boot-detail">Loading UI bundle and local VPN state.</div>
    </div>
    <div id="app"></div>
    <script type="module">
      const splash = document.getElementById('boot-splash')
      const title = document.getElementById('boot-title')
      const detail = document.getElementById('boot-detail')

      const describeError = (error) => {
        if (!error) {
          return 'Unknown startup error'
        }
        if (typeof error === 'string') {
          return error
        }
        if (error instanceof Error) {
          return error.stack || error.message
        }
        try {
          return JSON.stringify(error, null, 2)
        } catch {
          return String(error)
        }
      }

      const renderError = (summary, error) => {
        if (!splash || !title || !detail) {
          return
        }
        splash.classList.remove('hidden')
        splash.dataset.state = 'error'
        title.textContent = summary
        detail.textContent = describeError(error)
      }

      window.__NVPN_HIDE_BOOT_SPLASH__ = () => {
        splash?.classList.add('hidden')
      }

      window.addEventListener('error', (event) => {
        renderError('Frontend bootstrap failed', event.error || event.message)
      })

      window.addEventListener('unhandledrejection', (event) => {
        renderError('Unhandled promise rejection', event.reason)
      })

      import('/src/main.ts').catch((error) => {
        renderError('Failed to load UI bundle', error)
      })
    </script>
  </body>
</html>
